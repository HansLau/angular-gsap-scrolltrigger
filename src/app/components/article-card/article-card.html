<article class="article-card">
  <a [href]="link()" class="article-card__link">
    <div class="article-card__image">
      <img [src]="imageUrl()" [alt]="" loading="lazy" />
      <span class="article-card__category">{{ category() }}</span>
    </div>
    <div class="article-card__content">
      <h3 class="article-card__title">
        {{ title() }}
        <svg 
          class="article-card__arrow" 
          xmlns="http://www.w3.org/2000/svg" 
          width="20" 
          height="20" 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M7 17L17 7M17 7H7M17 7V17"/>
        </svg>
      </h3>
      <p class="article-card__description">{{ description() }}</p>
      <div class="article-card__author">
        <span class="article-card__author-name">{{ author() }}</span>
        <span class="article-card__author-divider">|</span>
        <span class="article-card__author-role">{{ authorRole() }}</span>
      </div>
    </div>
  </a>
</article>
